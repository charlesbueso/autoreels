# Global runtime settings for chessbrain-content
output_dir: output
data_dir: data
image_cache_dir: data/image_cache

schedule:
  timezone: America/New_York
  slots:           # 3 posts/day
    - "08:00"
    - "13:00"
    - "19:00"

canvas:
  carousel:
    width: 1080
    height: 1350    # 4:5 — universal IG fit
  reel:
    width: 1080
    height: 1920
  safe_margin: 96   # px padding from edges

llm:
  provider: groq
  model: llama-3.3-70b-versatile
  max_tokens: 2048
  temperature: 0.85
  json_retries: 3

embeddings:
  provider: openai
  model: text-embedding-3-small
  dim: 1536

similarity_gate:
  threshold: 0.85       # cosine sim above which a candidate is rejected
  loosened: 0.90        # used after max_attempts
  max_attempts: 3
  lookback_days: 90

imagegen:
  default_model: nano_banana
  fallback_model: flux_dev
  cover_model: flux_pro
  text_in_image_model: ideogram_v3
  monthly_budget_usd: 30.0

reels:
  cadence_days: 10
  duration_sec: 15
  fps: 30
