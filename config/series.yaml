    - "Capablanca vs Tartakower 1924"
    - "Karpov vs Kasparov 1985 game 16"
    - "Spassky vs Fischer 1972 game 6"
    - "Aronian vs Anand 2013 — Wijk aan Zee"
    - "Carlsen vs Karjakin 2016 game 10"
    - "Reti vs Alekhine 1925"
    - "Polgar vs Karpov 2003"

