# Recurring weekday series that iterate one parameter to guarantee novelty.
# Each list item is a "param" the director cycles through (no repeat within 12 weeks).

mascot_monday:
  description: Single-image post of the mascot in a different environment/weather every week.
  rotation_floor_weeks: 12
  params:
    - rainy city street with neon reflections
    - snowy mountain cabin at dusk
    - sunny tropical beach with palm trees
    - autumn forest with falling leaves
    - desert canyon at golden hour
    - cyberpunk neon arcade
    - cozy library at midnight, stacks of books
    - espresso bar at dawn, steam rising from cups
    - foggy lighthouse cliff at sunrise
    - space station window, earth in background
    - jungle waterfall with parrots
    - subway platform, late night
    - rooftop garden at sunset
    - ski lift in falling snow
    - greenhouse full of tropical plants
    - vintage train compartment, countryside passing by
    - chess club basement, vintage clocks on shelves
    - astronaut moonwalk, planted flag with chess king
    - underwater coral reef, fish drifting
    - thunderstorm at the front porch, mug of tea
    - hot air balloon over patchwork fields
    - art deco hotel lobby
    - bookstore aisle, shafts of afternoon light
    - winter ice rink at night
    - rural farm kitchen, morning sunlight
    - park bench in autumn rain, holding a chess book
    - tokyo street at night, vending machines glowing
    - vintage barbershop chair
    - amusement park ferris wheel at twilight
    - art studio with paint-splattered chess pieces
    - mountain cable car, snow peaks below
    - city park in cherry blossom season
    - antarctic penguin colony
    - hot springs bath, snow falling
    - volcanic island lookout
    - rainy hammock between two trees
    - fireplace at a ski lodge
    - autumn pumpkin patch
    - venetian gondola at twilight
    - planetarium dome with stars projected

