wisdom_wednesday:
  description: GM quote card cycles through famous players.
  rotation_floor_weeks: 8
  params:
    - { author: "Bobby Fischer", quote: "Tactics flow from a superior position." }
    - { author: "Mikhail Tal", quote: "You must take your opponent into a deep dark forest where 2+2=5." }
    - { author: "Magnus Carlsen", quote: "I don't believe in psychology. I believe in good moves." }
    - { author: "Savielly Tartakower", quote: "The blunders are all there on the board, waiting to be made." }
    - { author: "Aron Nimzowitsch", quote: "The threat is stronger than the execution." }
    - { author: "Emanuel Lasker", quote: "When you see a good move, look for a better one." }
    - { author: "José Raúl Capablanca", quote: "A good player is always lucky." }
    - { author: "Garry Kasparov", quote: "Chess is mental torture." }
    - { author: "Anatoly Karpov", quote: "Chess is everything: art, science, and sport." }
    - { author: "Siegbert Tarrasch", quote: "Before the endgame, the gods have placed the middlegame." }
    - { author: "Vladimir Kramnik", quote: "Chess is a sea in which a gnat may drink and an elephant may bathe." }
    - { author: "Hikaru Nakamura", quote: "I think it's important to stay sharp." }

